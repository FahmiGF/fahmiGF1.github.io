  <!DOCTYPE html>
  <html lang="en">

  <head>
    <meta charset="UTF-8">
    <title>Tugas Linktree</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet">

    <style>
      body {
        background: #caa4a48f;
        display: flex;
        justify-content: center;
        align-items: center;
        margin-top: 2%;
      }

      .card {
        width: 30%;
        background: #F4F5F7;
        border-radius: 20px;
        padding: 20px;
        text-align: center;
      }

      .logo img {
        width: 20%;
        margin: auto;
      }

      .top-bar {
        display: flex;
        justify-content: space-between;
        margin-bottom: 10px;
      }

      .left-icon {
        background: #fff;
        padding: 10px;
        border-radius: 8px;
        font-size: 14px;
        cursor: pointer;
      }

      .right-icon {
        background: #fff;
        padding: 6px 10px;
        border-radius: 8px;
        font-size: 14px;
        cursor: pointer;
      }

      .left-icon:hover {
        background: #ececec;
      }

      .right-icon:hover {
        background: #ececec;
      }

      .url-card {
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: #f7f7f7;
        padding: 12px;
        border-radius: 12px;
      }

      .url-card:hover {
        background: #ececec;
        cursor: pointer;
      }

      .url-card img {
        width: 45px;
        height: 45px;
      }

      .top-bar img {
        width: 15px;
        height: 15px;
      }

      .join-btn {
        background: white;
        padding: 10px 18px;
        border-radius: 20px;
        border: none;
        cursor: pointer;
        font-size: 14px;
      }

      .bottom {
        margin-top: 20px;
      }

      .footer {
        margin-top: 12px;
        font-size: 11px;
        color: #333;
      }
    </style>
  </head>

  <body>

    <div class="card">
      <div class="top-bar">
        <div class="left-icon"> <img
            src="linktree-transparent-icon-free.png">
        </div>
        <div class="right-icon"> <img src="sharing icon.png"> </div>
      </div>

      <div class="logo">
        <img
          src="forddd.jpg">
      </div>
      <h3>The Ford Influencers</h3>
      <span>Ford Motor Company’s employee influencer and advocacy team.</span>
      <span><b>#FordInfluencer #WeAreFord</b> </span>

      <div class="links">
        <div class="url-card">
          <img src="ford influencer.jpg">
          <span>About the #FordInfluencers</span>
          <span>⋮</span>
        </div>

          <div class="url-card">
            <img src="Ford online news.webp">
            <span>#FordOnline News</span>
            <span>⋮</span>
          </div>

            <div class="url-card">
              <img src="ford heritage vault icon.jpg">
              <span>Ford Heritage Vault</span>
              <span>⋮</span>
            </div>

              <div class="url-card">
                <img
                  src="tiktokicon.png">
                <span>#WeAreFord - Tiktok</span>
                <span>⋮</span>
              </div>
              
                <div class="url-card">
                  <img
                    src="facebookicon.png">
                  <span>#WeAreFord - Facebook</span>
                  <span>⋮</span>
                </div>

                <div class="links">
                  <div class="url-card">
                    <img
                      src="linkedinicon.jpg">
                  <span>#WeAreFord - LinkedIn </span>
                    <span>⋮</span>
                  </div>

                </div>
              </div>

              <div class="bottom">
                <button class="join-btn"> Join fordinfluencers on Linktree</button>

                <div class="footer">
                  <span>Cookie Preferences</span> ·
                  <span>Report</span> ·
                  <span>Privacy</span> ·
                  <span>Explore</span>
                </div>
              </div>
  </body>
  </html>
